<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1414;
      --panel: #14201f;
      --panel-2: #1a2a28;
      --card: #1c2d2a;
      --border: rgba(212, 175, 55, 0.28);
      --accent: #d4af37;
      --text: #f4f1e8;
      --muted: #b7bdb8;
      --danger: #d86a6a;
      --shadow: 0 10px 24px rgba(0,0,0,0.22);

      --cat-travail-bg: rgba(86, 156, 214, 0.16);
      --cat-travail-border: rgba(86, 156, 214, 0.38);
      --cat-travail-text: #cde7ff;

      --cat-perso-bg: rgba(208, 122, 255, 0.14);
      --cat-perso-border: rgba(208, 122, 255, 0.34);
      --cat-perso-text: #f0d6ff;

      --cat-autres-bg: rgba(110, 177, 139, 0.14);
      --cat-autres-border: rgba(110, 177, 139, 0.34);
      --cat-autres-text: #d8f5e3;

      --cat-custom-bg: rgba(212, 175, 55, 0.12);
      --cat-custom-border: rgba(212, 175, 55, 0.28);
      --cat-custom-text: #f4df9b;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.06), transparent 30%),
        linear-gradient(180deg, #081111 0%, #0d1818 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      padding: 12px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
    }

    .header,
    .editor,
    .filters {
      background: linear-gradient(180deg, rgba(20,32,31,0.95), rgba(18,28,27,0.95));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    .header h1,
    .editor h2,
    .notes-header h2 {
      color: var(--accent);
      margin-bottom: 0;
    }

    .toolbar-top,
    .filter-row,
    .inline-row,
    .category-add {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toolbar-top {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--border);
      background: #101918;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #8f9892;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.5;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.96rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s ease, background 0.12s ease;
      min-height: 48px;
      width: 100%;
      text-align: center;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      color: #16130d;
      font-weight: 700;
    }

    .btn-home {
      background: rgba(212, 175, 55, 0.12);
      color: #f2dfad;
    }

    .btn-danger {
      background: rgba(216, 106, 106, 0.12);
      color: #ffd2d2;
      border-color: rgba(216,106,106,0.28);
    }

    .small {
      font-size: 0.88rem;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .checkbox-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .filter-search {
      flex: 1 1 100%;
    }

    .filter-group {
      flex: 1 1 180px;
      min-width: 160px;
    }

    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .count {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .note-card {
      background: linear-gradient(180deg, rgba(28,45,42,0.98), rgba(24,38,36,0.98));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .note-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      background: rgba(212, 175, 55, 0.25);
    }

    .note-card.cat-travail::before { background: #569cd6; }
    .note-card.cat-perso::before { background: #d07aff; }
    .note-card.cat-autres::before { background: #6eb18b; }
    .note-card.cat-custom::before { background: #d4af37; }

    .note-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .note-title {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.25;
      color: #fff9eb;
      word-break: break-word;
    }

    .note-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      border: 1px solid transparent;
    }

    .badge.type {
      background: rgba(110, 177, 139, 0.10);
      border-color: rgba(110,177,139,0.25);
      color: #cbeed8;
    }

    .badge.favorite {
      background: rgba(255, 215, 0, 0.10);
      border-color: rgba(255,215,0,0.22);
      color: #ffe58a;
    }

    .badge.pinned {
      background: rgba(255, 189, 89, 0.10);
      border-color: rgba(255,189,89,0.22);
      color: #ffd79a;
    }

    .badge.cat-travail {
      background: var(--cat-travail-bg);
      border-color: var(--cat-travail-border);
      color: var(--cat-travail-text);
    }

    .badge.cat-perso {
      background: var(--cat-perso-bg);
      border-color: var(--cat-perso-border);
      color: var(--cat-perso-text);
    }

    .badge.cat-autres {
      background: var(--cat-autres-bg);
      border-color: var(--cat-autres-border);
      color: var(--cat-autres-text);
    }

    .badge.cat-custom {
      background: var(--cat-custom-bg);
      border-color: var(--cat-custom-border);
      color: var(--cat-custom-text);
    }

    .note-content {
      white-space: pre-wrap;
      color: var(--text);
      line-height: 1.6;
      margin: 10px 0 14px;
      word-break: break-word;
    }

    .checklist {
      margin: 8px 0 14px;
      padding: 0;
      list-style: none;
    }

    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .checklist li:last-child {
      border-bottom: none;
    }

    .checklist input[type="checkbox"] {
      margin-top: 2px;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .checklist span.done {
      text-decoration: line-through;
      color: var(--muted);
    }

    .note-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .note-date {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .note-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .note-actions .btn {
      width: auto;
      min-width: 46px;
      padding: 10px 12px;
    }

    .empty-state {
      text-align: center;
      background: rgba(20,32,31,0.82);
      border: 1px dashed var(--border);
      border-radius: 20px;
      padding: 30px 18px;
      color: var(--muted);
    }

    .hidden {
      display: none !important;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(18, 28, 27, 0.95);
      color: #f4f1e8;
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      z-index: 999;
      max-width: calc(100vw - 24px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 760px) {
      body {
        padding: 16px;
      }

      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }

      .notes-grid {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar-top {
        display: flex;
        flex-wrap: wrap;
      }

      .toolbar-top .btn {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="header">
      <div class="topbar">
        <h1>Notes</h1>
      </div>

      <div class="toolbar-top">
        <button class="btn btn-primary" id="newNoteBtn">Nouvelle note</button>
        <button class="btn" id="newListBtn">Nouvelle liste</button>
        <a href="index.html" class="btn btn-home">← Accueil</a>
        <button class="btn" id="resetFiltersBtn">Réinitialiser filtres</button>
      </div>
    </section>

    <section class="editor">
      <h2 id="editorTitle">Créer une note</h2>

      <div class="editor-grid">
        <input type="hidden" id="editingId" />

        <div class="grid-2">
          <div>
            <label class="small" for="noteTitle">Titre</label>
            <input type="text" id="noteTitle" placeholder="Ex. idées, appel client, épicerie..." />
          </div>

          <div>
            <label class="small" for="noteCategory">Catégorie</label>
            <select id="noteCategory"></select>
          </div>
        </div>

        <div class="category-add">
          <input type="text" id="newCategoryInput" placeholder="Créer une nouvelle catégorie..." />
          <button class="btn" id="addCategoryBtn">Ajouter catégorie</button>
        </div>

        <div>
          <label class="small" for="noteContent">Contenu</label>
          <textarea id="noteContent" placeholder="Écris ta note ici..."></textarea>
        </div>

        <div id="listEditor" class="hidden">
          <label class="small" for="listItems">Items de la liste</label>
          <textarea id="listItems" placeholder="Un item par ligne&#10;Exemple :&#10;Acheter du lait&#10;Envoyer le suivi&#10;Appeler Martin"></textarea>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="favoriteToggle" />
          <label for="favoriteToggle">Marquer comme favori</label>

          <input type="checkbox" id="pinnedToggle" />
          <label for="pinnedToggle">Épingler</label>
        </div>

        <div class="inline-row">
          <button class="btn btn-primary" id="saveBtn">Enregistrer</button>
          <button class="btn" id="cancelEditBtn">Annuler</button>
        </div>
      </div>
    </section>

    <section class="filters">
      <div class="filter-row">
        <div class="filter-search">
          <label class="small" for="searchInput">Recherche</label>
          <input type="text" id="searchInput" placeholder="Rechercher par mot-clé..." />
        </div>

        <div class="filter-group">
          <label class="small" for="filterCategory">Catégorie</label>
          <select id="filterCategory">
            <option value="all">Toutes les catégories</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="small" for="filterType">Type</label>
          <select id="filterType">
            <option value="all">Tout</option>
            <option value="note">Notes</option>
            <option value="list">Listes</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="small" for="filterFavorites">Favoris</label>
          <select id="filterFavorites">
            <option value="all">Tout</option>
            <option value="favorites">Favoris seulement</option>
          </select>
        </div>
      </div>
    </section>

    <section>
      <div class="notes-header">
        <h2>Mes notes</h2>
        <div class="count" id="notesCount">0 élément</div>
      </div>

      <div class="notes-grid" id="notesContainer"></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script>
    const searchInput = document.getElementById("searchInput");
    const filterCategory = document.getElementById("filterCategory");
    const filterType = document.getElementById("filterType");
    const filterFavorites = document.getElementById("filterFavorites");

    const editorTitle = document.getElementById("editorTitle");
    const editingId = document.getElementById("editingId");
    const noteTitle = document.getElementById("noteTitle");
    const noteCategory = document.getElementById("noteCategory");
    const newCategoryInput = document.getElementById("newCategoryInput");
    const noteContent = document.getElementById("noteContent");
    const listEditor = document.getElementById("listEditor");
    const listItems = document.getElementById("listItems");
    const favoriteToggle = document.getElementById("favoriteToggle");
    const pinnedToggle = document.getElementById("pinnedToggle");

    const notesContainer = document.getElementById("notesContainer");
    const notesCount = document.getElementById("notesCount");
    const toast = document.getElementById("toast");

    const newNoteBtn = document.getElementById("newNoteBtn");
    const newListBtn = document.getElementById("newListBtn");
    const addCategoryBtn = document.getElementById("addCategoryBtn");
    const saveBtn = document.getElementById("saveBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const resetFiltersBtn = document.getElementById("resetFiltersBtn");

    let currentType = "note";

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString("fr-CA", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function normalizeCategoryClass(category) {
      const value = (category || "").trim().toLowerCase();
      if (value === "travail") return "cat-travail";
      if (value === "perso") return "cat-perso";
      if (value === "autres") return "cat-autres";
      return "cat-custom";
    }

    function setEditorMode(type) {
      currentType = type === "list" ? "list" : "note";
      const isList = currentType === "list";
      editorTitle.textContent = isList ? "Créer une liste" : "Créer une note";
      listEditor.classList.toggle("hidden", !isList);
      noteContent.placeholder = isList
        ? "Ajoute une description optionnelle pour ta liste..."
        : "Écris ta note ici...";
    }

    async function populateCategorySelectors() {
      const categories = await AppData.getCategories();

      noteCategory.innerHTML = "";
      filterCategory.innerHTML = '<option value="all">Toutes les catégories</option>';

      categories.forEach(cat => {
        const optionEditor = document.createElement("option");
        optionEditor.value = cat.name;
        optionEditor.textContent = cat.name;
        noteCategory.appendChild(optionEditor);

        const optionFilter = document.createElement("option");
        optionFilter.value = cat.name;
        optionFilter.textContent = cat.name;
        filterCategory.appendChild(optionFilter);
      });
    }

    async function resetEditor() {
      editingId.value = "";
      noteTitle.value = "";
      noteContent.value = "";
      listItems.value = "";
      favoriteToggle.checked = false;
      pinnedToggle.checked = false;
      setEditorMode("note");

      const categories = await AppData.getCategories();
      if (categories.length) {
        noteCategory.value = categories[0].name;
      }
    }

    async function renderNotes() {
      const filters = {
        keyword: searchInput.value.trim(),
        category: filterCategory.value,
        type: filterType.value,
        favoritesOnly: filterFavorites.value === "favorites",
        pinnedFirst: true,
        includeArchived: false
      };

      const notes = await AppData.searchNotes(filters);
      notesContainer.innerHTML = "";
      notesCount.textContent = `${notes.length} ${notes.length > 1 ? "éléments" : "élément"}`;

      if (!notes.length) {
        notesContainer.innerHTML = `
          <div class="empty-state">
            <strong>Aucune note trouvée.</strong><br><br>
            Essaie un autre mot-clé, enlève un filtre ou crée une nouvelle note.
          </div>
        `;
        return;
      }

      notes.forEach(note => {
        const categoryClass = normalizeCategoryClass(note.category);
        const card = document.createElement("article");
        card.className = `note-card ${categoryClass}`;

        const itemsHtml = note.type === "list"
          ? `
            <ul class="checklist">
              ${(note.items || []).map(item => `
                <li>
                  <input
                    type="checkbox"
                    ${item.done ? "checked" : ""}
                    onchange="toggleChecklistItem('${note.id}', '${item.id}')"
                  />
                  <span class="${item.done ? "done" : ""}">${escapeHtml(item.text)}</span>
                </li>
              `).join("")}
            </ul>
          `
          : "";

        card.innerHTML = `
          <div class="note-top">
            <h3 class="note-title">${escapeHtml(note.title || "(Sans titre)")}</h3>
            <div class="note-actions">
              <button class="btn" onclick="togglePinned('${note.id}')">${note.pinned ? "📌" : "📍"}</button>
              <button class="btn" onclick="toggleFavorite('${note.id}')">${note.favorite ? "⭐" : "☆"}</button>
            </div>
          </div>

          <div class="note-badges">
            <span class="badge ${categoryClass}">${escapeHtml(note.category)}</span>
            <span class="badge type">${note.type === "list" ? "Liste" : "Note"}</span>
            ${note.favorite ? '<span class="badge favorite">Favori</span>' : ""}
            ${note.pinned ? '<span class="badge pinned">Épinglée</span>' : ""}
          </div>

          ${note.content ? `<div class="note-content">${escapeHtml(note.content)}</div>` : ""}
          ${itemsHtml}

          <div class="note-footer">
            <div class="note-date">Modifié : ${formatDate(note.updatedAt)}</div>
            <div class="note-actions">
              <button class="btn" onclick="editNote('${note.id}')">Modifier</button>
              <button class="btn btn-danger" onclick="deleteNote('${note.id}')">Supprimer</button>
            </div>
          </div>
        `;

        notesContainer.appendChild(card);
      });
    }

    async function addCategory() {
      const value = newCategoryInput.value.trim();
      if (!value) return;

      try {
        const category = await AppData.addCategory(value);
        newCategoryInput.value = "";
        await populateCategorySelectors();
        noteCategory.value = category.name;
        showToast("Catégorie ajoutée");
      } catch (error) {
        alert(error.message);
      }
    }

    async function saveNote() {
      const title = noteTitle.value.trim();
      const category = noteCategory.value;
      const content = noteContent.value.trim();
      const favorite = favoriteToggle.checked;
      const pinned = pinnedToggle.checked;
      const existingId = editingId.value.trim();

      if (!title) {
        alert("Ajoute un titre à ta note.");
        return;
      }

      if (!category) {
        alert("Choisis une catégorie.");
        return;
      }

      try {
        let note;

        if (existingId) {
          note = await AppData.getNoteById(existingId);
          if (!note) {
            note = AppData.createEmptyNote(currentType, category);
          }
        } else {
          note = AppData.createEmptyNote(currentType, category);
        }

        note.type = currentType;
        note.title = title;
        note.category = category;
        note.content = content;
        note.favorite = favorite;
        note.pinned = pinned;

        if (currentType === "list") {
          const rawItems = listItems.value
            .split("\n")
            .map(item => item.trim())
            .filter(Boolean);

          if (!rawItems.length) {
            alert("Ajoute au moins un item dans ta liste.");
            return;
          }

          const oldItems = Array.isArray(note.items) ? note.items : [];

          note.items = rawItems.map(text => {
            const existing = oldItems.find(item => item.text === text);
            return existing || {
              id: `item_${Date.now()}_${Math.random().toString(16).slice(2, 8)}`,
              text,
              done: false,
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString()
            };
          });
        } else {
          if (!content) {
            alert("Ajoute du contenu à ta note.");
            return;
          }
          note.items = [];
        }

        await AppData.saveNote(note);
        await resetEditor();
        await renderNotes();
        showToast("Note enregistrée");
      } catch (error) {
        alert(error.message);
      }
    }

    async function editNote(noteId) {
      const note = await AppData.getNoteById(noteId);
      if (!note) return;

      editingId.value = note.id;
      noteTitle.value = note.title || "";
      noteContent.value = note.content || "";
      favoriteToggle.checked = !!note.favorite;
      pinnedToggle.checked = !!note.pinned;

      await populateCategorySelectors();
      noteCategory.value = note.category;

      setEditorMode(note.type);

      if (note.type === "list") {
        listItems.value = (note.items || []).map(item => item.text).join("\n");
      } else {
        listItems.value = "";
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
      showToast("Mode modification");
    }

    async function deleteNote(noteId) {
      const confirmed = confirm("Supprimer cette note ?");
      if (!confirmed) return;

      await AppData.deleteNote(noteId);
      if (editingId.value === noteId) {
        await resetEditor();
      }
      await renderNotes();
      showToast("Note supprimée");
    }

    async function toggleFavorite(noteId) {
      const note = await AppData.toggleFavorite(noteId);
      await renderNotes();
      showToast(note.favorite ? "Ajoutée aux favoris" : "Retirée des favoris");
    }

    async function togglePinned(noteId) {
      const note = await AppData.togglePinned(noteId);
      await renderNotes();
      showToast(note.pinned ? "Note épinglée" : "Note désépinglée");
    }

    async function toggleChecklistItem(noteId, itemId) {
      await AppData.toggleChecklistItem(noteId, itemId);
      await renderNotes();
    }

    function resetFilters() {
      searchInput.value = "";
      filterCategory.value = "all";
      filterType.value = "all";
      filterFavorites.value = "all";
      renderNotes();
    }

    async function applyUrlFilters() {
      const params = new URLSearchParams(window.location.search);
      const filter = params.get("filter");

      if (filter === "favorites") {
        filterFavorites.value = "favorites";
      }
    }

    async function init() {
      await populateCategorySelectors();
      await resetEditor();
      await applyUrlFilters();
      await renderNotes();
    }

    newNoteBtn.addEventListener("click", async () => {
      await resetEditor();
      setEditorMode("note");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    newListBtn.addEventListener("click", async () => {
      await resetEditor();
      setEditorMode("list");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    addCategoryBtn.addEventListener("click", addCategory);
    saveBtn.addEventListener("click", saveNote);
    cancelEditBtn.addEventListener("click", resetEditor);

    searchInput.addEventListener("input", renderNotes);
    filterCategory.addEventListener("change", renderNotes);
    filterType.addEventListener("change", renderNotes);
    filterFavorites.addEventListener("change", renderNotes);
    resetFiltersBtn.addEventListener("click", resetFilters);

    window.editNote = editNote;
    window.deleteNote = deleteNote;
    window.toggleFavorite = toggleFavorite;
    window.togglePinned = togglePinned;
    window.toggleChecklistItem = toggleChecklistItem;

    init();
  </script>
</body>
</html>
