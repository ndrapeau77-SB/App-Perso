<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calories</title>

<style>
*{box-sizing:border-box}
:root{
  --bg-top:#031313;--bg-bottom:#082120;--border:rgba(170,142,65,.52);
  --accent:#d9b24b;--text:#f4f1e8;--muted:#bcc8c0;
}
body{
  margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);
  background:radial-gradient(circle at top,rgba(0,100,80,.16),transparent 35%),
  linear-gradient(180deg,var(--bg-top),var(--bg-bottom));
  display:flex;justify-content:center;
}
.app{width:100%;max-width:560px;min-height:100vh;padding:10px}
.card{
  border:1px solid var(--border);border-radius:28px;
  background:linear-gradient(180deg,rgba(4,37,34,.96),rgba(3,27,26,.96));
  padding:16px;margin-bottom:14px;
}
.title{text-align:center;color:var(--accent);font-weight:700;margin:0 0 14px}
.input{
  width:100%;padding:12px;border-radius:14px;border:1px solid rgba(170,142,65,.45);
  background:rgba(7,32,30,.92);color:var(--text);margin-bottom:10px;
}
.btn{
  width:100%;padding:12px;border-radius:999px;border:1px solid rgba(170,142,65,.62);
  background:rgba(7,32,30,.92);color:var(--text);font-weight:700;cursor:pointer;
}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.result,.meal{
  border:1px solid rgba(170,142,65,.3);border-radius:18px;padding:12px;
  background:rgba(4,24,23,.72);margin-top:10px;
}
.name{color:var(--accent);font-weight:700;margin-bottom:6px}
.meta{color:var(--muted);font-size:.9rem;line-height:1.4}
.progress-wrap{height:14px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#2e6a5d,#7dc8a3)}
.back{display:block;text-align:center;color:var(--text);text-decoration:none;margin-bottom:12px}
</style>
</head>

<body>
<main class="app">
  <a href="index.html" class="back">← Retour</a>

  <section class="card">
    <p class="title">Compteur de calories</p>

    <input class="input" id="goalInput" type="number" placeholder="Objectif quotidien ex: 2000">
    <button class="btn" id="saveGoalBtn">Sauvegarder objectif</button>

    <div class="result">
      <div class="name">Aujourd’hui</div>
      <div class="meta" id="summaryText">0 cal consommées</div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>
  </section>

  <section class="card">
    <p class="title">Chercher un aliment</p>

    <input class="input" id="searchInput" placeholder="Ex: banane, yogourt, oeuf, poulet">
    <button class="btn" id="searchBtn">Rechercher</button>

    <div id="results"></div>
  </section>

  <section class="card">
    <p class="title">Repas du jour</p>
    <div id="mealList"></div>
    <button class="btn" id="resetDayBtn" style="margin-top:12px;">Réinitialiser la journée</button>
  </section>
</main>

<script>
const DAILY_KEY = "calorieDailyLog";
const GOAL_KEY = "calorieGoal";

function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function getLog(){
  const all = JSON.parse(localStorage.getItem(DAILY_KEY) || "{}");
  return all[todayKey()] || [];
}

function saveLog(log){
  const all = JSON.parse(localStorage.getItem(DAILY_KEY) || "{}");
  all[todayKey()] = log;
  localStorage.setItem(DAILY_KEY, JSON.stringify(all));
}

function getGoal(){
  return Number(localStorage.getItem(GOAL_KEY) || 2000);
}

function saveGoal(){
  const value = Number(document.getElementById("goalInput").value);
  if(value > 0){
    localStorage.setItem(GOAL_KEY, value);
    render();
  }
}

async function searchFood(){
  const query = document.getElementById("searchInput").value.trim();
  const box = document.getElementById("results");
  if(!query) return;

  box.innerHTML = `<div class="meta">Recherche...</div>`;

  try{
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=8`;
    const res = await fetch(url);
    const data = await res.json();

    const products = (data.products || [])
      .filter(p => p.product_name && p.nutriments && p.nutriments["energy-kcal_100g"]);

    if(!products.length){
      box.innerHTML = `<div class="meta">Aucun résultat clair trouvé.</div>`;
      return;
    }

    box.innerHTML = products.map((p, index) => {
      const name = p.product_name;
      const brand = p.brands || "";
      const kcal = Math.round(p.nutriments["energy-kcal_100g"]);
      return `
        <div class="result">
          <div class="name">${name}</div>
          <div class="meta">${brand ? brand + " • " : ""}${kcal} cal / 100 g</div>
          <input class="input" id="qty-${index}" type="number" placeholder="Quantité en grammes ex: 125">
          <button class="btn" onclick="addFood('${encodeURIComponent(name)}', ${kcal}, 'qty-${index}')">Ajouter</button>
        </div>
      `;
    }).join("");
  }catch(e){
    box.innerHTML = `<div class="meta">Erreur de recherche.</div>`;
  }
}

function addFood(encodedName, kcal100g, qtyId){
  const name = decodeURIComponent(encodedName);
  const qty = Number(document.getElementById(qtyId).value || 100);
  const calories = Math.round((kcal100g * qty) / 100);

  const log = getLog();
  log.push({ id: Date.now(), name, qty, kcal100g, calories });
  saveLog(log);
  render();
}

function removeFood(id){
  const log = getLog().filter(item => item.id !== id);
  saveLog(log);
  render();
}

function resetDay(){
  saveLog([]);
  render();
}

function render(){
  const log = getLog();
  const goal = getGoal();
  const total = log.reduce((sum,item)=>sum + item.calories,0);
  const remaining = goal - total;
  const percent = Math.min(100, Math.round((total / goal) * 100));

  document.getElementById("goalInput").value = goal;
  document.getElementById("summaryText").textContent =
    `${total} cal consommées / ${goal} cal — ${remaining >= 0 ? remaining + " restantes" : Math.abs(remaining) + " au-dessus"}`;
  document.getElementById("progressBar").style.width = `${percent}%`;

  document.getElementById("mealList").innerHTML = log.length
    ? log.map(item => `
      <div class="meal">
        <div class="name">${item.name}</div>
        <div class="meta">${item.qty} g • ${item.calories} cal</div>
        <button class="btn" onclick="removeFood(${item.id})">Supprimer</button>
      </div>
    `).join("")
    : `<div class="meta">Aucun aliment ajouté aujourd’hui.</div>`;
}

document.getElementById("searchBtn").addEventListener("click", searchFood);
document.getElementById("saveGoalBtn").addEventListener("click", saveGoal);
document.getElementById("resetDayBtn").addEventListener("click", resetDay);

render();
</script>
</body>
</html>
