<script>
async function loadDiscovery() {
  const box = document.getElementById("discoveryBox");
  box.innerHTML = `<div class="loading">Chargement...</div>`;

  try {
    const res = await fetch("https://decouverte-app.ndrapeau77.workers.dev/", {
      method: "GET",
      mode: "cors",
      cache: "no-store"
    });

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();

    box.innerHTML = `
      <div class="result-title">${data.title || "Découverte"}</div>
      ${data.image ? `<img class="result-img" src="${data.image}" alt="" style="width:100%;border-radius:12px;margin-bottom:10px;display:block;">` : ""}
      <div class="result-text">${data.summary || ""}</div>
      ${data.url ? `<a class="link" href="${data.url}" target="_blank" rel="noopener">Voir plus</a>` : ""}
    `;
  } catch (e) {
    box.innerHTML = `<div class="loading">Erreur : ${e.message}</div>`;
    console.error("Erreur découverte :", e);
  }
}

document.getElementById("discoverBtn").addEventListener("click", loadDiscovery);
</script>
