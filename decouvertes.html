<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Découverte</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #031313 0%, #082120 100%);
      color: #f4f1e8;
    }

    .app {
      max-width: 560px;
      margin: auto;
      padding: 12px;
    }

    .card {
      border: 1px solid rgba(170, 142, 65, 0.52);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(4, 37, 34, 0.96), rgba(3, 27, 26, 0.96));
      padding: 16px;
      margin-bottom: 14px;
    }

    .title {
      color: #d9b24b;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 12px;
      text-align: center;
    }

    .btn {
      width: 100%;
      border: 1px solid rgba(170, 142, 65, 0.62);
      background: rgba(7, 32, 30, 0.92);
      color: #f4f1e8;
      padding: 12px;
      border-radius: 999px;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .result-title {
      color: #d9b24b;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .result-text {
      line-height: 1.55;
      color: #f4f1e8;
      margin-bottom: 12px;
    }

    .result-img {
      width: 100%;
      border-radius: 14px;
      margin-bottom: 12px;
      display: none;
    }

    .link {
      display: inline-block;
      color: #d9b24b;
      text-decoration: none;
      font-weight: 700;
    }

    .loading {
      color: #bcc8c0;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="title">Découverte / apprentissage</div>
      <button class="btn" id="discoverBtn">Nouvelle découverte</button>

      <div id="discoveryBox">
        <div class="loading">Clique pour découvrir quelque chose de nouveau.</div>
      </div>
    </section>
  </main>

  <script>
    async function loadDiscovery() {
      const box = document.getElementById("discoveryBox");
      box.innerHTML = `<div class="loading">Chargement...</div>`;

      try {
        const res = await fetch("https://decouverte-app.ndrapeau77.workers.dev");
        const data = await res.json();

        box.innerHTML = `
          <div class="result-title">${data.title || "Découverte"}</div>
          ${data.image ? `<img class="result-img" src="${data.image}" alt="" style="display:block;">` : ""}
          <div class="result-text">${data.summary || ""}</div>
          ${data.url ? `<a class="link" href="${data.url}" target="_blank" rel="noopener">Voir plus</a>` : ""}
        `;
      } catch (e) {
        box.innerHTML = `<div class="loading">Erreur de chargement.</div>`;
      }
    }

    document.getElementById("discoverBtn").addEventListener("click", loadDiscovery);
  </script>
</body>
</html>
