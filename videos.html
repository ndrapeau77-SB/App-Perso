<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vidéos</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1414;
      --panel: #14201f;
      --panel-2: #1a2a28;
      --card: #1c2d2a;
      --border: rgba(212, 175, 55, 0.28);
      --accent: #d4af37;
      --text: #f4f1e8;
      --muted: #b7bdb8;
      --shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.06), transparent 30%),
        linear-gradient(180deg, #081111 0%, #0d1818 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      padding: 12px;
    }

    .app {
      max-width: 1150px;
      margin: 0 auto;
    }

    .header,
    .filters,
    .categories-panel {
      background: linear-gradient(180deg, rgba(20,32,31,0.95), rgba(18,28,27,0.95));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    .header h1,
    .section-title {
      color: var(--accent);
      margin-bottom: 0;
    }

    .toolbar-top {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.96rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s ease, background 0.12s ease;
      min-height: 48px;
      width: 100%;
      text-align: center;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-home {
      background: rgba(212, 175, 55, 0.12);
      color: #f2dfad;
    }

    .btn-soft {
      background: rgba(212, 175, 55, 0.08);
    }

    .small {
      font-size: 0.88rem;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input[type="text"],
    select {
      width: 100%;
      border: 1px solid var(--border);
      background: #101918;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
    }

    input::placeholder {
      color: #8f9892;
    }

    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-search {
      flex: 1 1 100%;
    }

    .filter-group {
      flex: 1 1 220px;
      min-width: 180px;
    }

    .category-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .category-btn {
      width: auto;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(212, 175, 55, 0.08);
      color: var(--text);
      border: 1px solid rgba(212, 175, 55, 0.25);
      cursor: pointer;
      font-size: 0.92rem;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .category-btn:active {
      transform: scale(0.98);
    }

    .category-btn.active {
      background: var(--accent);
      color: #16130d;
      border-color: var(--accent);
      font-weight: 700;
    }

    .videos-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .count {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .video-card {
      background: linear-gradient(180deg, rgba(28,45,42,0.98), rgba(24,38,36,0.98));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
    }

    .video-preview-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      border: 1px solid rgba(212,175,55,0.18);
    }

    .video-preview {
      width: 100%;
      display: block;
      border-radius: 16px;
      background: #000;
      max-height: 260px;
      object-fit: cover;
    }

    .video-title {
      font-size: 1.02rem;
      color: #fff9eb;
      margin: 0;
      line-height: 1.3;
    }

    .video-category {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(212, 175, 55, 0.10);
      border: 1px solid rgba(212, 175, 55, 0.25);
      color: #f0dfaa;
      font-size: 0.82rem;
    }

    .video-desc {
      color: var(--muted);
      line-height: 1.5;
      margin: 0;
      font-size: 0.94rem;
    }

    .video-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .video-actions .btn {
      width: auto;
      min-width: 120px;
    }

    .favorite-btn {
      min-width: 52px !important;
      padding: 10px 12px !important;
    }

    .empty-state {
      text-align: center;
      background: rgba(20,32,31,0.82);
      border: 1px dashed var(--border);
      border-radius: 20px;
      padding: 30px 18px;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(18, 28, 27, 0.95);
      color: #f4f1e8;
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      z-index: 999;
      max-width: calc(100vw - 24px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 760px) {
      body {
        padding: 16px;
      }

      .toolbar-top {
        display: flex;
        flex-wrap: wrap;
      }

      .toolbar-top .btn {
        width: auto;
      }

      .video-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 1050px) {
      .video-grid {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="header">
      <div class="topbar">
        <h1>Vidéos</h1>
      </div>

      <div class="toolbar-top">
        <a href="index.html" class="btn btn-home">← Accueil</a>
        <button class="btn btn-soft" id="resetFiltersBtn">Réinitialiser filtres</button>
      </div>
    </section>

    <section class="filters">
      <div class="filter-row">
        <div class="filter-search">
          <label class="small" for="searchInput">Recherche</label>
          <input type="text" id="searchInput" placeholder="Rechercher une vidéo..." />
        </div>

        <div class="filter-group">
          <label class="small" for="filterFavorites">Favoris</label>
          <select id="filterFavorites">
            <option value="all">Tout</option>
            <option value="favorites">Favoris seulement</option>
          </select>
        </div>
      </div>
    </section>

    <section class="categories-panel">
      <h2 class="section-title">Catégories</h2>
      <div class="category-buttons" id="categoryButtons"></div>
    </section>

    <section>
      <div class="videos-header">
        <h2 class="section-title" id="currentCategoryTitle">Toutes les vidéos</h2>
        <div class="count" id="videosCount">0 vidéo</div>
      </div>

      <div class="video-grid" id="videosContainer"></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "video_page_data_v1";

    const searchInput = document.getElementById("searchInput");
    const filterFavorites = document.getElementById("filterFavorites");
    const resetFiltersBtn = document.getElementById("resetFiltersBtn");
    const videosContainer = document.getElementById("videosContainer");
    const categoryButtons = document.getElementById("categoryButtons");
    const currentCategoryTitle = document.getElementById("currentCategoryTitle");
    const videosCount = document.getElementById("videosCount");
    const toast = document.getElementById("toast");

    let allVideos = [];
    let activeCategory = "all";

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function slugify(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function buildVideoId(video) {
      return slugify(video.file || video.title || Math.random().toString(16).slice(2));
    }

    function autoDescription(video) {
      const title = video.title || "";
      const category = video.category || "Autres";
      return `Vidéo dans la catégorie ${category} : ${title}.`;
    }

    function getStorageData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        return parsed && typeof parsed === "object"
          ? parsed
          : { favorites: [], progress: {} };
      } catch {
        return { favorites: [], progress: {} };
      }
    }

    function saveStorageData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function isFavorite(videoId) {
      const data = getStorageData();
      return data.favorites.includes(videoId);
    }

    function toggleFavorite(videoId) {
      const data = getStorageData();
      const exists = data.favorites.includes(videoId);

      if (exists) {
        data.favorites = data.favorites.filter(id => id !== videoId);
      } else {
        data.favorites.push(videoId);
      }

      saveStorageData(data);
      return !exists;
    }

    function saveProgress(videoId, time) {
      const data = getStorageData();
      data.progress[videoId] = time;
      saveStorageData(data);
    }

    function getProgress(videoId) {
      const data = getStorageData();
      return data.progress[videoId] || 0;
    }

    async function loadVideos() {
      try {
        const response = await fetch("./videos.json");
        if (!response.ok) throw new Error("videos.json introuvable");

        const data = await response.json();
        if (!Array.isArray(data)) {
          throw new Error("videos.json doit contenir un tableau");
        }

        allVideos = data.map(video => ({
          ...video,
          id: buildVideoId(video),
          description: video.description || autoDescription(video)
        }));

        renderCategoryButtons();
        renderVideos();
      } catch (error) {
        console.error(error);
        videosContainer.innerHTML = `
          <div class="empty-state">
            Impossible de charger les vidéos.<br><br>
            Vérifie le fichier <strong>videos.json</strong>.
          </div>
        `;
      }
    }

    function getCategories() {
      return [...new Set(allVideos.map(video => video.category).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "fr"));
    }

    function renderCategoryButtons() {
      const categories = getCategories();

      const buttons = [
        `<button class="category-btn ${activeCategory === "all" ? "active" : ""}" data-category="all">Tout</button>`,
        ...categories.map(category => `
          <button class="category-btn ${activeCategory === category ? "active" : ""}" data-category="${escapeHtml(category)}">
            ${escapeHtml(category)}
          </button>
        `)
      ];

      categoryButtons.innerHTML = buttons.join("");

      categoryButtons.querySelectorAll(".category-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeCategory = btn.getAttribute("data-category");
          renderCategoryButtons();
          renderVideos();
        });
      });
    }

    function getFilteredVideos() {
      const keyword = searchInput.value.trim().toLowerCase();
      const favoritesOnly = filterFavorites.value === "favorites";

      return allVideos.filter(video => {
        const matchCategory = activeCategory === "all" || video.category === activeCategory;
        const matchFavorite = !favoritesOnly || isFavorite(video.id);

        const matchKeyword =
          !keyword ||
          (video.title || "").toLowerCase().includes(keyword) ||
          (video.description || "").toLowerCase().includes(keyword) ||
          (video.category || "").toLowerCase().includes(keyword) ||
          (video.file || "").toLowerCase().includes(keyword);

        return matchCategory && matchFavorite && matchKeyword;
      });
    }

    function renderVideos() {
      const filtered = getFilteredVideos();

      currentCategoryTitle.textContent =
        activeCategory === "all" ? "Toutes les vidéos" : activeCategory;

      videosCount.textContent = `${filtered.length} vidéo${filtered.length > 1 ? "s" : ""}`;

      if (!filtered.length) {
        videosContainer.innerHTML = `
          <div class="empty-state">
            Aucune vidéo trouvée.<br><br>
            Essaie une autre recherche ou une autre catégorie.
          </div>
        `;
        return;
      }

      videosContainer.innerHTML = filtered.map(video => {
        const fav = isFavorite(video.id);
        const progress = getProgress(video.id);
        const progressText = progress > 0 ? `Reprendre (${Math.floor(progress)}s)` : "Lire";

        return `
          <article class="video-card">
            <div class="video-preview-wrap">
              <video
                class="video-preview"
                controls
                preload="metadata"
                playsinline
                ontimeupdate="handleTimeUpdate('${video.id}', this)"
                onended="handleVideoEnded('${video.id}')"
              >
                <source src="${video.file}" type="video/mp4">
                Ton navigateur ne supporte pas la lecture vidéo.
              </video>
            </div>

            <span class="video-category">${escapeHtml(video.category || "Autres")}</span>
            <h3 class="video-title">${escapeHtml(video.title || "Sans titre")}</h3>
            <p class="video-desc">${escapeHtml(video.description || "")}</p>

            <div class="video-actions">
              <button class="btn btn-soft" onclick="handleResumeVideo('${video.id}')">${progressText}</button>
              <button class="btn favorite-btn" onclick="handleToggleFavorite('${video.id}')">${fav ? "⭐" : "☆"}</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function handleToggleFavorite(videoId) {
      const favoriteNow = toggleFavorite(videoId);
      renderVideos();
      showToast(favoriteNow ? "Ajoutée aux favoris" : "Retirée des favoris");
    }

    function handleResumeVideo(videoId) {
      const progress = getProgress(videoId);
      const videos = document.querySelectorAll(".video-preview");

      videos.forEach(videoEl => {
        const source = videoEl.querySelector("source");
        if (!source) return;

        const matchedVideo = allVideos.find(v => v.id === videoId);
        if (!matchedVideo) return;

        if (source.getAttribute("src") === matchedVideo.file) {
          videoEl.currentTime = progress || 0;
          videoEl.play().catch(() => {});
          videoEl.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      });
    }

    function handleTimeUpdate(videoId, videoEl) {
      if (!videoEl.paused && !videoEl.ended) {
        saveProgress(videoId, videoEl.currentTime);
      }
    }

    function handleVideoEnded(videoId) {
      saveProgress(videoId, 0);
      renderVideos();
    }

    function resetFilters() {
      searchInput.value = "";
      filterFavorites.value = "all";
      activeCategory = "all";
      renderCategoryButtons();
      renderVideos();
    }

    searchInput.addEventListener("input", renderVideos);
    filterFavorites.addEventListener("change", renderVideos);
    resetFiltersBtn.addEventListener("click", resetFilters);

    window.handleToggleFavorite = handleToggleFavorite;
    window.handleResumeVideo = handleResumeVideo;
    window.handleTimeUpdate = handleTimeUpdate;
    window.handleVideoEnded = handleVideoEnded;

    loadVideos();
  </script>
</body>
</html>
