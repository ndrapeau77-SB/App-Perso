<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vidéos</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1414;
      --panel: #14201f;
      --panel-2: #1a2a28;
      --card: #1c2d2a;
      --border: rgba(212, 175, 55, 0.28);
      --accent: #d4af37;
      --text: #f4f1e8;
      --muted: #b7bdb8;
      --shadow: 0 10px 24px rgba(0,0,0,0.22);
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.06), transparent 30%),
        linear-gradient(180deg, #081111 0%, #0d1818 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100%;
    }

    body {
      padding: 12px;
    }

    .app {
      max-width: 1150px;
      margin: 0 auto;
    }

    .header,
    .filters,
    .player-panel,
    .category-section {
      background: linear-gradient(180deg, rgba(20,32,31,0.95), rgba(18,28,27,0.95));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    .header h1,
    .category-title,
    .player-title {
      color: var(--accent);
      margin-bottom: 0;
    }

    .toolbar-top {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.96rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s ease, background 0.12s ease;
      min-height: 48px;
      width: 100%;
      text-align: center;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-home {
      background: rgba(212, 175, 55, 0.12);
      color: #f2dfad;
    }

    .btn-soft {
      background: rgba(212, 175, 55, 0.08);
    }

    .small {
      font-size: 0.88rem;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input[type="text"],
    select {
      width: 100%;
      border: 1px solid var(--border);
      background: #101918;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
    }

    input::placeholder {
      color: #8f9892;
    }

    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-search {
      flex: 1 1 100%;
    }

    .filter-group {
      flex: 1 1 220px;
      min-width: 180px;
    }

    .player-panel.hidden {
      display: none;
    }

    .player-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }

    .main-video {
      width: 100%;
      border-radius: 18px;
      background: #000;
      display: block;
    }

    .player-meta {
      display: grid;
      gap: 10px;
    }

    .player-desc {
      color: var(--muted);
      line-height: 1.55;
      margin: 0;
    }

    .player-category {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(212, 175, 55, 0.10);
      border: 1px solid rgba(212, 175, 55, 0.25);
      color: #f0dfaa;
      font-size: 0.84rem;
    }

    .player-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .player-actions .btn {
      width: auto;
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .count {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .video-card {
      background: linear-gradient(180deg, rgba(28,45,42,0.98), rgba(24,38,36,0.98));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
    }

    .video-thumb {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(212,175,55,0.16), rgba(255,255,255,0.04));
      border: 1px solid rgba(212,175,55,0.18);
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      text-align: center;
    }

    .thumb-title {
      color: #fff9eb;
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.35;
    }

    .play-badge {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .video-title {
      font-size: 1.05rem;
      color: #fff9eb;
      margin: 0;
    }

    .video-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .video-category {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(212, 175, 55, 0.10);
      border: 1px solid rgba(212, 175, 55, 0.25);
      color: #f0dfaa;
      font-size: 0.82rem;
    }

    .favorite-btn {
      width: auto;
      min-width: 46px;
      padding: 10px 12px;
    }

    .video-desc {
      color: var(--muted);
      line-height: 1.5;
      margin: 0;
      font-size: 0.94rem;
    }

    .video-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .video-actions .btn {
      width: auto;
    }

    .empty-state {
      text-align: center;
      background: rgba(20,32,31,0.82);
      border: 1px dashed var(--border);
      border-radius: 20px;
      padding: 30px 18px;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(18, 28, 27, 0.95);
      color: #f4f1e8;
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      z-index: 999;
      max-width: calc(100vw - 24px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 760px) {
      body {
        padding: 16px;
      }

      .toolbar-top {
        display: flex;
        flex-wrap: wrap;
      }

      .toolbar-top .btn {
        width: auto;
      }

      .video-grid {
        grid-template-columns: 1fr 1fr;
      }

      .player-wrap {
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="header">
      <div class="topbar">
        <h1>Vidéos</h1>
      </div>

      <div class="toolbar-top">
        <a href="index.html" class="btn btn-home">← Accueil</a>
        <button class="btn btn-soft" id="resetFiltersBtn">Réinitialiser filtres</button>
      </div>
    </section>

    <section class="filters">
      <div class="filter-row">
        <div class="filter-search">
          <label class="small" for="searchInput">Recherche</label>
          <input type="text" id="searchInput" placeholder="Rechercher une vidéo..." />
        </div>

        <div class="filter-group">
          <label class="small" for="filterCategory">Catégorie</label>
          <select id="filterCategory">
            <option value="all">Toutes les catégories</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="small" for="filterFavorites">Favoris</label>
          <select id="filterFavorites">
            <option value="all">Tout</option>
            <option value="favorites">Favoris seulement</option>
          </select>
        </div>
      </div>
    </section>

    <section class="player-panel hidden" id="playerPanel">
      <div class="player-wrap">
        <video id="mainVideo" class="main-video" controls preload="metadata" playsinline></video>

        <div class="player-meta">
          <h2 class="player-title" id="playerTitle">Titre vidéo</h2>
          <div class="player-category" id="playerCategory">Catégorie</div>
          <p class="player-desc" id="playerDesc">Description</p>

          <div class="player-actions">
            <button class="btn btn-soft" id="resumeBtn">Reprendre</button>
            <button class="btn btn-soft" id="fullscreenBtn">Plein écran</button>
            <button class="btn btn-soft" id="playerFavoriteBtn">☆ Favori</button>
          </div>
        </div>
      </div>
    </section>

    <div id="videosContainer"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "video_page_data_v1";

    const searchInput = document.getElementById("searchInput");
    const filterCategory = document.getElementById("filterCategory");
    const filterFavorites = document.getElementById("filterFavorites");
    const resetFiltersBtn = document.getElementById("resetFiltersBtn");
    const videosContainer = document.getElementById("videosContainer");

    const playerPanel = document.getElementById("playerPanel");
    const mainVideo = document.getElementById("mainVideo");
    const playerTitle = document.getElementById("playerTitle");
    const playerCategory = document.getElementById("playerCategory");
    const playerDesc = document.getElementById("playerDesc");
    const resumeBtn = document.getElementById("resumeBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const playerFavoriteBtn = document.getElementById("playerFavoriteBtn");
    const toast = document.getElementById("toast");

    let allVideos = [];
    let currentVideo = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function slugify(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function buildVideoId(video) {
      return slugify(video.file || video.title || Math.random().toString(16).slice(2));
    }

    function getStorageData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        return parsed && typeof parsed === "object"
          ? parsed
          : { favorites: [], progress: {} };
      } catch {
        return { favorites: [], progress: {} };
      }
    }

    function saveStorageData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function isFavorite(videoId) {
      const data = getStorageData();
      return data.favorites.includes(videoId);
    }

    function toggleFavorite(videoId) {
      const data = getStorageData();
      const exists = data.favorites.includes(videoId);

      if (exists) {
        data.favorites = data.favorites.filter(id => id !== videoId);
      } else {
        data.favorites.push(videoId);
      }

      saveStorageData(data);
      return !exists;
    }

    function saveProgress(videoId, time) {
      const data = getStorageData();
      data.progress[videoId] = time;
      saveStorageData(data);
    }

    function getProgress(videoId) {
      const data = getStorageData();
      return data.progress[videoId] || 0;
    }

    async function loadVideos() {
      try {
        const response = await fetch("./videos.json");
        if (!response.ok) throw new Error("videos.json introuvable");

        const data = await response.json();
        if (!Array.isArray(data)) {
          throw new Error("videos.json doit contenir un tableau");
        }

        allVideos = data.map(video => ({
          ...video,
          id: buildVideoId(video),
          description: video.description || ""
        }));

        populateCategories(allVideos);
        renderVideos();

        if (allVideos.length) {
          openVideo(allVideos[0], false);
        }
      } catch (error) {
        console.error(error);
        videosContainer.innerHTML = `
          <div class="empty-state">
            Impossible de charger les vidéos.<br><br>
            Vérifie le fichier <strong>videos.json</strong>.
          </div>
        `;
      }
    }

    function populateCategories(videos) {
      const categories = [...new Set(videos.map(video => video.category).filter(Boolean))].sort((a, b) => a.localeCompare(b, "fr"));

      filterCategory.innerHTML = `<option value="all">Toutes les catégories</option>`;

      categories.forEach(category => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        filterCategory.appendChild(option);
      });
    }

    function getFilteredVideos() {
      const keyword = searchInput.value.trim().toLowerCase();
      const category = filterCategory.value;
      const favoritesOnly = filterFavorites.value === "favorites";

      return allVideos.filter(video => {
        const matchCategory = category === "all" || video.category === category;
        const matchFavorite = !favoritesOnly || isFavorite(video.id);

        const matchKeyword =
          !keyword ||
          (video.title || "").toLowerCase().includes(keyword) ||
          (video.description || "").toLowerCase().includes(keyword) ||
          (video.category || "").toLowerCase().includes(keyword) ||
          (video.file || "").toLowerCase().includes(keyword);

        return matchCategory && matchFavorite && matchKeyword;
      });
    }

    function groupByCategory(videos) {
      return videos.reduce((acc, video) => {
        const category = video.category || "Autres";
        if (!acc[category]) acc[category] = [];
        acc[category].push(video);
        return acc;
      }, {});
    }

    function renderVideos() {
      const filtered = getFilteredVideos();
      const grouped = groupByCategory(filtered);

      if (!filtered.length) {
        videosContainer.innerHTML = `
          <div class="empty-state">
            Aucune vidéo trouvée.<br><br>
            Essaie une autre recherche ou une autre catégorie.
          </div>
        `;
        return;
      }

      const categoryOrder = Object.keys(grouped).sort((a, b) => a.localeCompare(b, "fr"));

      videosContainer.innerHTML = categoryOrder.map(category => {
        const videosHtml = grouped[category].map(video => {
          const fav = isFavorite(video.id);
          const progress = getProgress(video.id);
          const progressText = progress > 0 ? `Reprendre à ${Math.floor(progress)} sec` : "Commencer";

          return `
            <article class="video-card">
              <div class="video-thumb">
                <div class="thumb-title">${escapeHtml(video.title || "Sans titre")}</div>
                <div class="play-badge">▶</div>
              </div>

              <div class="video-meta">
                <span class="video-category">${escapeHtml(video.category || "Autres")}</span>
                <button class="btn favorite-btn" onclick="handleToggleFavorite('${video.id}')">${fav ? "⭐" : "☆"}</button>
              </div>

              <h3 class="video-title">${escapeHtml(video.title || "Sans titre")}</h3>
              <p class="video-desc">${escapeHtml(video.description || "Aucune description pour l’instant.")}</p>

              <div class="video-actions">
                <button class="btn btn-soft" onclick="handleOpenVideo('${video.id}')">Lire</button>
                <button class="btn btn-soft" onclick="handleResumeVideo('${video.id}')">${progressText}</button>
              </div>
            </article>
          `;
        }).join("");

        return `
          <section class="category-section">
            <div class="category-header">
              <h2 class="category-title">${escapeHtml(category)}</h2>
              <div class="count">${grouped[category].length} vidéo${grouped[category].length > 1 ? "s" : ""}</div>
            </div>
            <div class="video-grid">
              ${videosHtml}
            </div>
          </section>
        `;
      }).join("");
    }

    function openVideo(video, autoPlay = true, resume = false) {
      if (!video) return;

      currentVideo = video;
      playerPanel.classList.remove("hidden");

      playerTitle.textContent = video.title || "Sans titre";
      playerCategory.textContent = video.category || "Autres";
      playerDesc.textContent = video.description || "Aucune description pour l’instant.";

      mainVideo.src = video.file;
      mainVideo.load();

      const progress = getProgress(video.id);

      mainVideo.onloadedmetadata = () => {
        if (resume && progress > 0 && progress < mainVideo.duration) {
          mainVideo.currentTime = progress;
        }

        if (autoPlay) {
          mainVideo.play().catch(() => {});
        }
      };

      updatePlayerFavoriteButton();
      playerPanel.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function updatePlayerFavoriteButton() {
      if (!currentVideo) return;
      playerFavoriteBtn.textContent = isFavorite(currentVideo.id) ? "⭐ Favori" : "☆ Favori";
    }

    function handleOpenVideo(videoId) {
      const video = allVideos.find(v => v.id === videoId);
      openVideo(video, true, false);
    }

    function handleResumeVideo(videoId) {
      const video = allVideos.find(v => v.id === videoId);
      openVideo(video, true, true);
    }

    function handleToggleFavorite(videoId) {
      const favoriteNow = toggleFavorite(videoId);
      renderVideos();

      if (currentVideo && currentVideo.id === videoId) {
        updatePlayerFavoriteButton();
      }

      showToast(favoriteNow ? "Ajoutée aux favoris" : "Retirée des favoris");
    }

    function resetFilters() {
      searchInput.value = "";
      filterCategory.value = "all";
      filterFavorites.value = "all";
      renderVideos();
    }

    searchInput.addEventListener("input", renderVideos);
    filterCategory.addEventListener("change", renderVideos);
    filterFavorites.addEventListener("change", renderVideos);
    resetFiltersBtn.addEventListener("click", resetFilters);

    resumeBtn.addEventListener("click", () => {
      if (!currentVideo) return;
      const progress = getProgress(currentVideo.id);
      if (progress > 0) {
        mainVideo.currentTime = progress;
        mainVideo.play().catch(() => {});
        showToast(`Reprise à ${Math.floor(progress)} sec`);
      } else {
        showToast("Aucune progression sauvegardée");
      }
    });

    fullscreenBtn.addEventListener("click", () => {
      if (!mainVideo) return;
      if (mainVideo.requestFullscreen) {
        mainVideo.requestFullscreen();
      } else if (mainVideo.webkitEnterFullscreen) {
        mainVideo.webkitEnterFullscreen();
      }
    });

    playerFavoriteBtn.addEventListener("click", () => {
      if (!currentVideo) return;
      handleToggleFavorite(currentVideo.id);
    });

    mainVideo.addEventListener("timeupdate", () => {
      if (currentVideo && !mainVideo.paused && !mainVideo.ended) {
        saveProgress(currentVideo.id, mainVideo.currentTime);
      }
    });

    mainVideo.addEventListener("ended", () => {
      if (currentVideo) {
        saveProgress(currentVideo.id, 0);
      }
    });

    window.handleOpenVideo = handleOpenVideo;
    window.handleResumeVideo = handleResumeVideo;
    window.handleToggleFavorite = handleToggleFavorite;

    loadVideos();
  </script>
</body>
</html>
