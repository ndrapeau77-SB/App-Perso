<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Résultats</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#071b1a">
  <link rel="apple-touch-icon" href="image_pastille.png">

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-top: #031313;
      --bg-bottom: #082120;
      --border: rgba(170, 142, 65, 0.52);
      --accent: #d9b24b;
      --text: #f4f1e8;
      --muted: #bcc8c0;
      --shadow: 0 14px 30px rgba(0,0,0,0.14);
      --green-soft: #7dc8a3;
      --green-deep: #2e6a5d;
      --panel: rgba(4, 37, 34, 0.96);
      --panel-soft: rgba(4, 24, 23, 0.72);
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0, 100, 80, 0.16), transparent 35%),
        linear-gradient(180deg, var(--bg-top) 0%, #05211f 55%, var(--bg-bottom) 100%);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 560px;
      min-height: 100vh;
      padding: 10px 10px 28px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(4, 37, 34, 0.96), rgba(3, 27, 26, 0.96));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        var(--shadow);
      padding: 18px 14px 16px;
      margin-bottom: 14px;
    }

    .top-title {
      color: var(--accent);
      font-size: 1.02rem;
      line-height: 1.2;
      margin: 2px 0 14px;
      font-weight: 700;
      text-align: center;
    }

    .subtle {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .back-link,
    .filter-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid rgba(170, 142, 65, 0.62);
      background: rgba(7, 32, 30, 0.92);
      color: var(--text);
      padding: 12px 10px;
      border-radius: 999px;
      font-size: 0.96rem;
      font-weight: 700;
      min-height: 52px;
      width: 100%;
      cursor: pointer;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .filter-btn.active {
      background: rgba(217, 178, 75, 0.14);
      color: var(--accent);
      border-color: rgba(217, 178, 75, 0.8);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box,
    .trend-box,
    .history-item {
      border: 1px solid rgba(170, 142, 65, 0.30);
      border-radius: 18px;
      padding: 14px;
      background: var(--panel-soft);
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.84rem;
      margin-bottom: 8px;
    }

    .stat-value {
      color: var(--accent);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .section-title {
      color: var(--accent);
      font-size: 0.98rem;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .history-list,
    .trend-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-date {
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .history-meta {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 6px;
    }

    .history-text {
      color: var(--text);
      font-size: 0.92rem;
      line-height: 1.45;
      white-space: pre-wrap;
      margin-top: 8px;
    }

    .progress-wrap {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      border: 1px solid rgba(170, 142, 65, 0.18);
      margin-top: 8px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--green-deep), var(--green-soft));
    }

    .trend-line {
      display: grid;
      grid-template-columns: 78px 1fr 54px;
      gap: 10px;
      align-items: center;
    }

    .trend-date {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .trend-value {
      text-align: right;
      color: var(--text);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .empty {
      color: var(--muted);
      font-size: 0.95rem;
      padding: 8px 2px;
    }

    @media (max-width: 520px) {
      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .trend-line {
        grid-template-columns: 70px 1fr 48px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <a href="index.html" class="back-link">← Retour à l’accueil</a>

    <section class="card">
      <p class="top-title">Résultats</p>
      <p class="subtle">Une vue plus claire de tes journées : eau, énergie, habitudes, tâches complétées, brain dump et review.</p>

      <div class="filters">
        <button class="filter-btn active" data-range="7">7 jours</button>
        <button class="filter-btn" data-range="30">30 jours</button>
        <button class="filter-btn" data-range="all">Tout</button>
      </div>
    </section>

    <section class="card">
      <p class="section-title">Vue d’ensemble</p>
      <div class="stats-grid" id="statsGrid"></div>
    </section>

    <section class="card">
      <p class="section-title">Tendance eau</p>
      <div class="trend-list" id="waterTrend"></div>
    </section>

    <section class="card">
      <p class="section-title">Historique détaillé</p>
      <div class="history-list" id="historyList"></div>
    </section>
  </main>

  <script>
    let currentRange = "7";

    function getJSON(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v ? JSON.parse(v) : fallback;
      } catch {
        return fallback;
      }
    }

    function getDailyTrackerStore() {
      return getJSON("dailyTrackerStore", {});
    }

    function getTaskDoneState() {
      return getJSON("weeklyTaskDone", {});
    }

    function energyLabel(value) {
      if (value === "low") return "Bas";
      if (value === "medium") return "Moyen";
      if (value === "high") return "Élevé";
      return "Non défini";
    }

    function dateKeysBack(days) {
      const result = [];
      const now = new Date();
      for (let i = 0; i < days; i++) {
        const d = new Date(now);
        d.setDate(now.getDate() - i);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        result.push(`${y}-${m}-${day}`);
      }
      return result;
    }

    function getFilteredEntries() {
      const store = getDailyTrackerStore();
      let entries = Object.entries(store).sort((a, b) => b[0].localeCompare(a[0]));

      if (currentRange === "7") {
        const keys = new Set(dateKeysBack(7));
        entries = entries.filter(([date]) => keys.has(date));
      } else if (currentRange === "30") {
        const keys = new Set(dateKeysBack(30));
        entries = entries.filter(([date]) => keys.has(date));
      }

      return entries;
    }

    function buildSummary(entries) {
      const taskDone = getTaskDoneState();

      let waterTotal = 0;
      let moveCount = 0;
      let relaxCount = 0;
      let reviewCount = 0;
      let brainDumpCount = 0;
      let tasksDoneCount = 0;
      let energyCount = { low: 0, medium: 0, high: 0 };

      entries.forEach(([date, item]) => {
        waterTotal += item.water || 0;
        if (item.move) moveCount++;
        if (item.relax) relaxCount++;
        if (item.review) reviewCount++;
        if (item.brainDump) brainDumpCount++;
        if (item.energy && energyCount[item.energy] !== undefined) {
          energyCount[item.energy]++;
        }

        Object.keys(taskDone).forEach(key => {
          if (key.startsWith(`${date}-`)) tasksDoneCount++;
        });
      });

      const totalDays = entries.length || 1;
      const avgWater = Math.round(waterTotal / totalDays);
      const bestEnergy = Object.entries(energyCount).sort((a, b) => b[1] - a[1])[0]?.[0] || "";

      return {
        daysTracked: entries.length,
        avgWater,
        moveCount,
        relaxCount,
        reviewCount,
        brainDumpCount,
        tasksDoneCount,
        bestEnergy: energyLabel(bestEnergy)
      };
    }

    function statBox(label, value) {
      return `
        <div class="stat-box">
          <div class="stat-label">${label}</div>
          <div class="stat-value">${value}</div>
        </div>
      `;
    }

    function renderStats(entries) {
      const s = buildSummary(entries);
      document.getElementById("statsGrid").innerHTML = [
        statBox("Jours suivis", s.daysTracked),
        statBox("Moyenne eau", `${s.avgWater} ml`),
        statBox("Jours bouger", `${s.moveCount}/${s.daysTracked || 0}`),
        statBox("Jours pause", `${s.relaxCount}/${s.daysTracked || 0}`),
        statBox("Tâches cochées", s.tasksDoneCount),
        statBox("Reviews écrites", s.reviewCount),
        statBox("Brain dumps", s.brainDumpCount),
        statBox("Énergie dominante", s.bestEnergy)
      ].join("");
    }

    function renderWaterTrend(entries) {
      const box = document.getElementById("waterTrend");

      if (!entries.length) {
        box.innerHTML = `<div class="empty">Aucune donnée d’eau pour cette période.</div>`;
        return;
      }

      const trendEntries = [...entries].reverse();

      box.innerHTML = trendEntries.map(([date, item]) => {
        const water = Math.max(0, Math.min(3000, item.water || 0));
        const percent = (water / 3000) * 100;

        return `
          <div class="trend-box">
            <div class="trend-line">
              <div class="trend-date">${date}</div>
              <div class="progress-wrap" style="margin:0;">
                <div class="progress-bar" style="width:${percent}%"></div>
              </div>
              <div class="trend-value">${water} ml</div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderHistory(entries) {
      const taskDone = getTaskDoneState();
      const list = document.getElementById("historyList");

      if (!entries.length) {
        list.innerHTML = `<div class="empty">Aucun historique pour cette période.</div>`;
        return;
      }

      list.innerHTML = entries.map(([date, item]) => {
        const water = Math.max(0, Math.min(3000, item.water || 0));
        const waterPercent = (water / 3000) * 100;
        const tasksDone = Object.keys(taskDone).filter(key => key.startsWith(`${date}-`)).length;
        const habitsDone = [item.move, item.relax].filter(Boolean).length;

        return `
          <div class="history-item">
            <div class="history-date">${date}</div>
            <div class="history-meta">Eau : ${water} ml</div>
            <div class="progress-wrap">
              <div class="progress-bar" style="width:${waterPercent}%"></div>
            </div>
            <div class="history-meta">Énergie : ${energyLabel(item.energy)}</div>
            <div class="history-meta">Habitudes : ${habitsDone}/2</div>
            <div class="history-meta">Tâches cochées : ${tasksDone}</div>
            ${item.brainDump ? `<div class="history-text"><strong>Brain dump :</strong><br>${item.brainDump}</div>` : ""}
            ${item.review ? `<div class="history-text"><strong>Review :</strong><br>${item.review}</div>` : ""}
          </div>
        `;
      }).join("");
    }

    function renderAll() {
      const entries = getFilteredEntries();
      renderStats(entries);
      renderWaterTrend(entries);
      renderHistory(entries);
    }

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentRange = btn.dataset.range;
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderAll();
      });
    });

    renderAll();
  </script>
</body>
</html>
