<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon App Perso</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#071b1a">
  <link rel="apple-touch-icon" href="image_pastille.png">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-top: #031313;
      --bg-bottom: #082120;
      --panel: rgba(4, 37, 34, 0.94);
      --panel-2: rgba(7, 28, 27, 0.82);
      --border: rgba(170, 142, 65, 0.52);
      --accent: #d9b24b;
      --text: #f4f1e8;
      --muted: #bcc8c0;
      --shadow: 0 14px 30px rgba(0,0,0,0.14);
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(0, 100, 80, 0.16), transparent 35%),
        linear-gradient(180deg, var(--bg-top) 0%, #05211f 55%, var(--bg-bottom) 100%);
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      padding: 10px 10px 28px;
    }

    .hero-card {
      border: 1px solid var(--border);
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(4, 37, 34, 0.96), rgba(3, 27, 26, 0.96));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        var(--shadow);
      padding: 18px 14px 16px;
      text-align: center;
      margin-bottom: 14px;
    }

    .top-title {
      color: var(--accent);
      font-size: 1rem;
      line-height: 1.2;
      margin: 2px 0 14px;
      font-weight: 600;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pill-btn {
      border: 1px solid rgba(170, 142, 65, 0.62);
      background: rgba(7, 32, 30, 0.92);
      color: var(--text);
      padding: 12px 10px;
      border-radius: 999px;
      font-size: 0.98rem;
      cursor: pointer;
      min-height: 54px;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .pill-btn:active {
      transform: scale(0.98);
    }

    .routine-box {
      border: 1px solid rgba(170, 142, 65, 0.45);
      border-radius: 24px;
      padding: 18px 16px;
      background: rgba(7, 28, 27, 0.74);
      text-align: left;
    }

    .routine-label {
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin: 0 0 8px;
    }

    .routine-title {
      font-size: 1.9rem;
      line-height: 1.02;
      font-weight: 700;
      color: var(--accent);
      margin: 0 0 12px;
    }

    .routine-text {
      font-size: 1.03rem;
      line-height: 1.5;
      color: #f0eee8;
      margin: 0;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    .menu-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 118px;
      text-align: center;
      border-radius: 28px;
      border: 1px solid rgba(170, 142, 65, 0.56);
      background: linear-gradient(180deg, rgba(4, 37, 34, 0.96), rgba(3, 27, 26, 0.96));
      color: #f2f0e8;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 14px 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .menu-card:active {
      transform: scale(0.985);
    }

    .menu-card.large {
      grid-column: 1 / -1;
      min-height: 108px;
    }

    .install-banner {
      position: sticky;
      bottom: 10px;
      display: none;
      margin-top: 14px;
      z-index: 10;
    }

    .install-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      background: var(--accent);
      color: #1b1710;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,0.22);
    }

    @media (max-width: 390px) {
      .app {
        padding: 8px 8px 24px;
      }

      .hero-card {
        padding: 14px 12px;
        border-radius: 24px;
      }

      .action-row {
        gap: 8px;
      }

      .pill-btn {
        font-size: 0.92rem;
        min-height: 50px;
        padding: 10px 8px;
      }

      .routine-box {
        padding: 16px 14px;
      }

      .routine-title {
        font-size: 1.7rem;
      }

      .routine-text {
        font-size: 0.98rem;
      }

      .menu-card {
        min-height: 98px;
        font-size: 1rem;
        border-radius: 22px;
      }

      .menu-card.large {
        min-height: 92px;
      }
    }

    @media (min-width: 700px) {
      .app {
        max-width: 620px;
      }

      .menu-grid {
        grid-template-columns: 1fr 1fr;
      }

      .menu-card {
        min-height: 128px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero-card">
      <p class="top-title">Excellence personnelle</p>

      <div class="action-row">
        <button class="pill-btn" id="favoritesBtn">☆ Favoris</button>
        <button class="pill-btn" id="quoteBtn">Nouvelle citation</button>
      </div>

      <div class="routine-box">
        <p class="routine-label">Routine du jour</p>
        <h1 class="routine-title" id="routineTitle">Citation du jour</h1>
        <p class="routine-text" id="quoteText">
          Success doesn’t just find you. You have to go out and get it.
        </p>
      </div>
    </section>

    <section class="menu-grid">
      <a href="videos.html" class="menu-card">Vidéos</a>
      <a href="decouverte.html" class="menu-card">Découverte / apprentissage</a>
      <a href="musique.html" class="menu-card">Musique</a>
      <a href="notes.html" class="menu-card">Notes</a>
      <a href="objectifs.html" class="menu-card large">Objectifs</a>
      <a href="moodboard.html" class="menu-card large">Mood board</a>
    </section>

    <div class="install-banner" id="installBanner">
      <button class="install-btn" id="installBtn">Installer l’app</button>
    </div>
  </main>

  <script>
    const defaultQuotes = [
      {
        title: "Citation du jour",
        text: "Success doesn’t just find you. You have to go out and get it."
      },
      {
        title: "Focus",
        text: "Ce que tu fais souvent finit par devenir ce que tu es."
      },
      {
        title: "Discipline",
        text: "Tu n’as pas besoin d’attendre d’être motivé pour commencer."
      },
      {
        title: "Mentalité",
        text: "If you really want to do something, you'll find a way. If you don't, you'll find an excuse."
      }
    ];

    let quotesData = defaultQuotes;

    async function loadQuotes() {
      try {
        const response = await fetch('./citations.json');
        if (!response.ok) throw new Error('citations.json introuvable');
        const data = await response.json();

        if (Array.isArray(data) && data.length) {
          quotesData = data.map(item => {
            if (typeof item === 'string') {
              return { title: 'Citation', text: item };
            }
            return {
              title: item.title || 'Citation du jour',
              text: item.text || item.quote || 'Contenu indisponible.'
            };
          });
        }
      } catch (e) {
        console.log('Chargement citations: fallback local', e);
      }
    }

    function showRandomQuote() {
      if (!quotesData.length) return;
      const random = quotesData[Math.floor(Math.random() * quotesData.length)];
      document.getElementById('routineTitle').textContent = random.title || 'Citation du jour';
      document.getElementById('quoteText').textContent = random.text || '';
    }

    document.getElementById('quoteBtn').addEventListener('click', showRandomQuote);

    document.getElementById('favoritesBtn').addEventListener('click', () => {
      window.location.href = 'notes.html?filter=favorites';
    });

    loadQuotes().then(showRandomQuote);

    let deferredPrompt = null;
    const installBanner = document.getElementById('installBanner');
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBanner.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBanner.style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(() => console.log('Service Worker enregistré'))
          .catch(err => console.log('Erreur Service Worker :', err));
      });
    }
  </script>
</body>
</html>
