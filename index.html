<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon App Fitness</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --accent-2: #16a34a;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 10px 25px rgba(0,0,0,0.25);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: var(--text);
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(34,197,94,0.18), rgba(34,197,94,0.06));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr;
      gap: 12px;
      margin: 18px 0 22px;
    }

    .input, .select, .button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px;
      background: var(--panel);
      color: var(--text);
      font-size: 0.98rem;
    }

    .button {
      background: var(--accent);
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    .button:hover { background: var(--accent-2); }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 26px 0 12px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .count {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
    }

    .video-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      max-height: 180px;
      overflow: hidden;
    }

    .video-wrap iframe,
    .video-wrap video {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .content {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
    }

    .title {
      font-size: 1.05rem;
      font-weight: bold;
      margin: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 0.78rem;
      padding: 7px 10px;
      background: var(--panel-2);
      border-radius: 999px;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .notes {
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.45;
      min-height: 40px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: auto;
    }

    .btn-secondary,
    .btn-danger {
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-secondary {
      background: #334155;
      color: white;
    }

    .btn-danger {
      background: #3f1d1d;
      color: #fecaca;
    }

    .btn-secondary:hover { filter: brightness(1.08); }
    .btn-danger:hover { filter: brightness(1.08); }

    .empty {
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 22px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,0.03);
    }

    .footer-note {
      color: #94a3b8;
      text-align: center;
      font-size: 0.9rem;
      margin: 24px 0 8px;
    }

    @media (max-width: 820px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 1.55rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>Mon App Fitness</h1>
      <p>Une petite bibliothèque perso pour tester tes vidéos d’exercices et d’entraînement. Tu peux filtrer, mettre en favoris, puis modifier le code facilement dans GitHub.</p>
    </section>

    <section class="toolbar">
      <input id="searchInput" class="input" type="text" placeholder="Rechercher un exercice..." />
      <select id="categoryFilter" class="select">
        <option value="all">Toutes les catégories</option>
      </select>
      <button id="showFavoritesBtn" class="button">Afficher seulement les favoris</button>
    </section>

    <section>
      <div class="section-title">
        <h2>Mes vidéos</h2>
        <span id="resultCount" class="count"></span>
      </div>
      <div id="videosGrid" class="grid"></div>
    </section>

    <p class="footer-note">Astuce: tu peux remplacer les exemples par tes propres liens YouTube ou tes vidéos .mp4.</p>
  </div>

  <script>
    const videos = [
      {
        id: 1,
        title: "Exercice genoux",
        category: "Rééducation",
        duration: "10 min",
        level: "Débutant",
        notes: "Exercices pour renforcer et mobiliser les genoux.",
        type: "mp4",
        src: "videos/excercice genoux.mp4"
      },
      {
        id: 2,
        title: "Low Impact Cardio",
        category: "Cardio",
        duration: "15 min",
        level: "Débutant",
        notes: "Cardio léger sans impact, parfait pour reprendre.",
        type: "mp4",
        src: "videos/low impact cardio.mp4"
      },
      {
        id: 3,
        title: "Étirements du dos",
        category: "Mobilité",
        duration: "8 min",
        level: "Tous niveaux",
        notes: "Routine simple pour relâcher les tensions du dos.",
        type: "mp4",
        src: "videos/étirements dos.mp4"
      },
      {
        id: 4,
        title: "Lymphatic Drainage Routine",
        category: "Récupération",
        duration: "12 min",
        level: "Tous niveaux",
        notes: "Routine douce pour la circulation et la récupération.",
        type: "mp4",
        src: "videos/Lymphatic Drainage Routine.mp4"
      },
      {
        id: 5,
        title: "Test vidéo",
        category: "Test",
        duration: "10 min",
        level: "Tous niveaux",
        notes: "Vidéo Drive",
        type: "iframe",
        src: "https://drive.google.com/file/d/1TGZse3Io9UQK2Rp_C3a3zxnO2spgB6fP/preview"
      }
    ];

    const grid = document.getElementById("videosGrid");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const resultCount = document.getElementById("resultCount");
    const showFavoritesBtn = document.getElementById("showFavoritesBtn");

    let favoritesOnly = false;
    let favorites = JSON.parse(localStorage.getItem("fitnessFavorites") || "[]");

    function saveFavorites() {
      localStorage.setItem("fitnessFavorites", JSON.stringify(favorites));
    }

    function isFavorite(id) {
      return favorites.includes(id);
    }

    function toggleFavorite(id) {
      if (isFavorite(id)) {
        favorites = favorites.filter(favId => favId !== id);
      } else {
        favorites.push(id);
      }
      saveFavorites();
      renderVideos();
    }

    function populateCategories() {
      const categories = [...new Set(videos.map(video => video.category))].sort();
      categories.forEach(category => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        categoryFilter.appendChild(option);
      });
    }

    function getFilteredVideos() {
      const search = searchInput.value.toLowerCase().trim();
      const category = categoryFilter.value;

      return videos.filter(video => {
        const matchesSearch =
          video.title.toLowerCase().includes(search) ||
          video.category.toLowerCase().includes(search) ||
          video.notes.toLowerCase().includes(search);

        const matchesCategory = category === "all" || video.category === category;
        const matchesFavorites = !favoritesOnly || isFavorite(video.id);

        return matchesSearch && matchesCategory && matchesFavorites;
      });
    }

    function renderMedia(video) {
      if (video.type === "youtube") {
        return `<iframe src="${video.src}" title="${video.title}" loading="lazy" allowfullscreen></iframe>`;
      }

      if (video.type === "mp4") {
        return `<video controls preload="metadata">
                  <source src="${video.src}" type="video/mp4">
                  Ton navigateur ne supporte pas la vidéo.
                </video>`;
      }

      if (video.type === "iframe") {
        return `<iframe src="${video.src}" title="${video.title}" loading="lazy" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
      }

      return `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:white;">Vidéo non supportée</div>`;
    }

    function renderVideos() {
      const filtered = getFilteredVideos();
      resultCount.textContent = `${filtered.length} vidéo${filtered.length > 1 ? "s" : ""}`;

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty">Aucune vidéo ne correspond à ta recherche.</div>`;
        return;
      }

      grid.innerHTML = filtered.map(video => `
        <article class="card">
          <div class="video-wrap">${renderMedia(video)}</div>
          <div class="content">
            <div class="topline">
              <h3 class="title">${video.title}</h3>
            </div>
            <div class="meta">
              <span class="tag">${video.category}</span>
              <span class="tag">${video.duration}</span>
              <span class="tag">${video.level}</span>
            </div>
            <div class="notes">${video.notes}</div>
            <div class="actions">
              <button class="btn-secondary" onclick="toggleFavorite(${video.id})">
                ${isFavorite(video.id) ? "★ Enlever des favoris" : "☆ Ajouter aux favoris"}
              </button>
              <button class="btn-danger" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">
                Retour en haut
              </button>
            </div>
          </div>
        </article>
      `).join("");
    }

    searchInput.addEventListener("input", renderVideos);
    categoryFilter.addEventListener("change", renderVideos);
    showFavoritesBtn.addEventListener("click", () => {
      favoritesOnly = !favoritesOnly;
      showFavoritesBtn.textContent = favoritesOnly
        ? "Afficher toutes les vidéos"
        : "Afficher seulement les favoris";
      renderVideos();
    });

    populateCategories();
    renderVideos();
  </script>
</body>
</html>
