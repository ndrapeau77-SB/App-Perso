<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Mon App Motivation</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b1d1a">

  <!-- iOS support (bonus) -->
  <link rel="apple-touch-icon" href="image_pastille.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #f5f5f5;
      background: linear-gradient(180deg, #0b1d1a, #102c28);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .quote {
      font-size: 1.3rem;
      font-weight: bold;
      max-width: 90%;
      margin-bottom: 20px;
    }

    .author {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 30px;
    }

    button {
      background: #d4af37;
      color: #000;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.97);
    }

    .install-btn {
      position: fixed;
      bottom: 20px;
      background: #ffffff;
      color: #000;
    }
  </style>
</head>

<body>

  <h1>Routine du jour</h1>

  <div class="quote" id="quote">
    Clique pour charger une citation
  </div>

  <div class="author" id="author"></div>

  <button onclick="loadRandomQuote()">Nouvelle citation</button>

  <button id="installBtn" class="install-btn" style="display:none;">
    Installer l'app
  </button>

  <script>
    // Charger citations
    async function loadRandomQuote() {
      const response = await fetch('citations.json');
      const data = await response.json();

      const random = data[Math.floor(Math.random() * data.length)];

      document.getElementById('quote').textContent = `"${random.text}"`;
      document.getElementById('author').textContent = random.author || "";
    }

    loadRandomQuote();

    // INSTALL APP (PWA)
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
      });
    });

    // SERVICE WORKER
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("Service Worker enregistré"))
        .catch(err => console.log("Erreur SW:", err));
    }
  </script>

</body>
</html>
