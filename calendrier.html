<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#041a18;
  color:white;
}

.app {
  max-width:560px;
  margin:auto;
  padding:12px;
}

.card {
  background:#062523;
  border:1px solid #bfa45a;
  border-radius:22px;
  padding:16px;
  margin-bottom:12px;
}

.title {
  color:#d9b24b;
  font-weight:700;
  margin-bottom:8px;
}

.item {
  border:1px solid rgba(191,164,90,0.4);
  border-radius:14px;
  padding:10px;
  margin-bottom:8px;
}

button {
  background:#d9b24b;
  border:none;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="app">

<div class="card">
  <div class="title">Aujourd’hui</div>
  <div id="date"></div>
</div>

<div class="card">
  <div class="title">Routine du jour</div>
  <div id="routine"></div>
</div>

<div class="card">
  <div class="title">Événements</div>
  <div id="events"></div>
</div>

<div class="card">
  <div class="title">Ajouter événement</div>

  <input id="title" placeholder="Titre" style="width:100%;margin-bottom:8px;">
  <input id="dateInput" type="date" style="width:100%;margin-bottom:8px;">
  <input id="time" type="time" style="width:100%;margin-bottom:8px;">

  <button onclick="addEvent()">Ajouter</button>
  <button onclick="exportICS()">Ajouter au cell</button>
</div>

</div>

<script>

const routines = [
  "Focus sur 1 tâche importante",
  "Respirer 5 minutes + planifier",
  "Bouger + lancer ta journée",
  "Clarté mentale avant action"
];

function today() {
  return new Date().toISOString().split('T')[0];
}

function load() {
  document.getElementById("date").textContent = new Date().toDateString();
  document.getElementById("routine").textContent = routines[new Date().getDay() % routines.length];
  render();
}

function getEvents() {
  return JSON.parse(localStorage.getItem("events") || "[]");
}

function saveEvents(e) {
  localStorage.setItem("events", JSON.stringify(e));
}

function addEvent() {
  const e = getEvents();
  e.push({
    title: document.getElementById("title").value,
    date: document.getElementById("dateInput").value,
    time: document.getElementById("time").value
  });
  saveEvents(e);
  render();
}

function render() {
  const list = getEvents().filter(e => e.date === today());
  document.getElementById("events").innerHTML =
    list.map(e => `<div class="item">${e.title} - ${e.time}</div>`).join("")
    || "Aucun événement";
}

function exportICS() {
  const title = document.getElementById("title").value;
  const date = document.getElementById("dateInput").value;
  const time = document.getElementById("time").value;

  if(!title) return;

  const start = date.replace(/-/g,'') + "T" + time.replace(':','') + "00";

  const data = `BEGIN:VCALENDAR
BEGIN:VEVENT
SUMMARY:${title}
DTSTART:${start}
END:VEVENT
END:VCALENDAR`;

  const blob = new Blob([data], {type:"text/calendar"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "event.ics";
  a.click();
}

load();

</script>
</body>
</html>
